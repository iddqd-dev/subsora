kind: pipeline
type: docker
name: full-redeploy-prod
platform:
  os: linux
  arch: amd64
steps:
  - name: check-changes
    image: alpine/git
    commands:
      - if ! git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -qE "(docker-compose.yml|.drone.yml)"; then exit 78; fi
  
  - name: validate-compose
    image: docker/compose:latest
    commands:
      - docker-compose config -f docker-compose.yml
  
  - name: deploy-webhook
    image: curlimages/curl:latest
    environment:
      DEPLOY_WEBHOOK: { from_secret: deploy_webhook_full_prod }
    commands:
      - curl -X POST $DEPLOY_WEBHOOK -H "Content-Type: application/json" -d "{\"type\":\"full-redeploy\",\"commit\":\"${DRONE_COMMIT_SHA}\"}"
trigger:
  branch: [main, master]
  event: [push]
