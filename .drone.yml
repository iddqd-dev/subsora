# ========================================================
# ===          PRODUCTION PIPELINES (AMD64)            ===
# ========================================================

---
kind: pipeline
type: docker
name: backend-prod
platform:
  os: linux
  arch: amd64

steps:
  - name: check-changes
    image: alpine/git
    commands:
      - if ! git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -q "backend/"; then echo "No changes in backend/"; exit 78; fi

  - name: build-push
    image: docker:dind
    privileged: true
    environment:
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }
    commands:
      - dockerd --host=unix:///var/run/docker.sock --tls=false & sleep 10
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:latest ./backend
      - docker push cicd.zerity.ru:55000/subsora/backend:latest

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      script:
        - cd /root/subsora && git pull origin master
        - docker stack deploy --with-registry-auth -c docker-compose.yml subsora
        - docker service update --force --image cicd.zerity.ru:55000/subsora/backend:latest subsora_backend

trigger:
  branch: [main, master]
  event: [push]

