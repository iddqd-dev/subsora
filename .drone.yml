kind: pipeline
type: docker
name: subsora-ci

volumes:
  - name: dockersock
    temp: {}

services:
  - name: docker
    image: docker:20.10.14-dind
    privileged: true
    volumes:
      - name: dockersock
        path: /var/run

trigger:
  branch: [master]
  event: [push]

steps:
  # ===========================================================================
  # Шаги для BACKEND
  # ===========================================================================
  - name: build and push backend
    image: docker:20.10.14
    volumes: [{name: dockersock, path: /var/run}]
    environment: {
      DOCKER_HOST: unix:///var/run/docker.sock,
      DOCKER_USERNAME: {from_secret: docker_username},
      DOCKER_PASSWORD: {from_secret: docker_password},
      SSH_HOST: { from_secret: ssh_host },
      SSH_USER: { from_secret: ssh_user },
      SSH_KEY: { from_secret: ssh_key }
    }
    commands:
      - |
        set -e
        timeout=20
        while ! docker ps > /dev/null 2>&1; do sleep 1; timeout=$(expr $timeout - 2); if [ $timeout -eq 0 ]; then echo "Dind failed to start."; exit 1; fi; done
        echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
        
        apk add --no-cache openssh-client

        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "StrictHostKeyChecking no" >> ~/.ssh/config
        
        cd backend
        scp $SSH_USER@$SSH_HOST:/root/subsora/backend/.env ./
        echo "✅ .env copied from production"
        ls -la .env
        grep -i "BACKEND_CORS_ORIGINS" .env
        docker build --network=host -t subsora-backend . --no-cache
        docker tag subsora-backend cicd.zerity.ru:55000/subsora/backend:latest
        docker push cicd.zerity.ru:55000/subsora/backend:latest
    when:
      change:
        includes: [backend/**]

  - name: deploy backend
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      envs: [DOCKER_USERNAME, DOCKER_PASSWORD]
      script:
        - echo "$DOCKER_PASSWORD" | docker login cicd.zerity.ru:55000 -u "$DOCKER_USERNAME" --password-stdin
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest
        - cd ~/subsora
        - |
          if docker stack ls --format "{{.Name}}" | grep -q "^subsora$"; then
            echo "🗑️ Removing existing stack..."
            docker stack rm subsora
            
            echo "⏳ Waiting for complete cleanup..."
            timeout=60
            while docker service ls --format "{{.Name}}" | grep -q "^subsora_" && [ $timeout -gt 0 ]; do
              echo "Still cleaning up services... ($timeout seconds left)"
              sleep 5
              timeout=$((timeout - 5))
            done
            
            if [ $timeout -eq 0 ]; then
              echo "⚠️ Cleanup timeout, but proceeding..."
            else
              echo "✅ Stack cleanup completed"
            fi
            
            sleep 10
          fi
        - echo "🚀 Deploying fresh stack..."
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - |
          echo "⏳ Waiting for services to start..."
          timeout=120
          while [ $timeout -gt 0 ]; do
            RUNNING=$(docker stack services subsora --format "{{.Replicas}}" | grep -c "1/1" || echo "0")
            TOTAL=$(docker stack services subsora --format "{{.Name}}" | wc -l)
            
            echo "Services running: $RUNNING/$TOTAL ($timeout seconds left)"
            
            if [ "$RUNNING" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
              echo "✅ All services are running!"
              break
            fi
            
            sleep 10
            timeout=$((timeout - 10))
          done
          
          if [ $timeout -eq 0 ]; then
            echo "⚠️ Some services may still be starting..."
          fi
        - echo "📋 Final status:"
        - docker stack services subsora
        - docker image prune -f
        - echo "🎉 Deployment completed!"
    environment:
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }
    when:
      change:
        includes: [ backend/** ]

  # ===========================================================================
  # Шаги для BOT
  # ===========================================================================
  - name: build and push bot
    image: docker:20.10.14
    volumes: [{name: dockersock, path: /var/run}]
    environment: {DOCKER_HOST: unix:///var/run/docker.sock, DOCKER_USERNAME: { from_secret: docker_username }, DOCKER_PASSWORD: { from_secret: docker_password }}
    commands:
      - |
        set -e
        timeout=20
        while ! docker ps > /dev/null 2>&1; do sleep 1; timeout=$(expr $timeout - 1); if [ $timeout -eq 0 ]; then echo "Dind failed to start."; exit 1; fi; done
        echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
        cd bot
        docker build --network=host -t subsora-bot .
        docker tag subsora-bot cicd.zerity.ru:55000/subsora/bot:latest
        docker push cicd.zerity.ru:55000/subsora/bot:latest
    when:
      change:
        includes: [bot/**]

  - name: deploy bot
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }
      script:
        - |
          set -ex
          echo "--- Deploying Bot to Swarm ---"
          cd ~/subsora
          git
          echo $$DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $$DOCKER_USERNAME --password-stdin
          docker service update --with-registry-auth --force --image cicd.zerity.ru:55000/subsora/bot:latest subsora_bot
          echo "✅ Bot service update command sent to Swarm!"
    when:
      change:
        includes: [bot/**]