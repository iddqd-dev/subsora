# subsora-full-redeploy-dev.yml
kind: pipeline
type: docker
name: subsora-full-redeploy-dev

steps:
  - name: check-changes
    image: alpine/git
    commands:
      - echo "Checking for changes in 'docker-compose.yml' or '.drone.yml' (DEV)..."
      - |
        if git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -qE "(docker-compose.yml|.drone.yml|docker-compose.dev.yml)"; then
          echo "Infrastructure changes detected. Continuing full redeploy."
        else
          echo "No infrastructure changes. Skipping pipeline."
          exit 78
        fi

  - name: full-redeploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host_dev
      port: 55522
      username:
        from_secret: ssh_user_dev
      key:
        from_secret: ssh_key_dev
      script:
        - echo "🔄 Full redeployment triggered (DEV)..."
        - mkdir -p /opt/subsora
        - cd /opt/subsora
        - if [ -d ".git" ]; then git checkout dev && git pull origin dev; else git clone -b dev git@cicd.zerity.ru:lokiboo_arud/subsora.git .; fi
        - export $(cat .env | grep -v '^#' | xargs)

        - docker stack rm subsora || echo "Stack not found, proceeding."
        - echo "Waiting for stack to be removed..."
        - sleep 15

        - echo "Ensuring network exists..."
        - docker network inspect subsora_network >/dev/null 2>&1 || docker network create --driver overlay --attachable subsora_network

        # Обратите внимание: docker-compose.yml на сервере dev должен использовать образы с тегом :dev,
        # либо вы должны переопределять их здесь, но обычно проще иметь отдельный compose для dev или использовать переменные окружения.
        # Ниже деплой стандартного compose. Убедитесь, что compose файл на ветке dev ссылается на правильные образы.
        - docker pull cicd.zerity.ru:55000/subsora/bot:dev
        - docker stack deploy -c docker-compose.dev.yml subsora --with-registry-auth
        - echo "✅ Full stack DEV redeployed!"
        - sleep 10
        - docker stack services subsora
    depends_on:
      - check-changes

