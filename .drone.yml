kind: pipeline
type: docker
name: backend

trigger:
  branch: [master]
  event: [push]
  path: [backend/**]

steps:
  - name: build and push
    image: plugins/docker
    settings:
      username: { from_secret: docker_username }
      password: { from_secret: docker_password }
      registry: cicd.zerity.ru:55000
      repo: cicd.zerity.ru:55000/subsora/backend
      tags: latest
      context: backend
      dockerfile: backend/Dockerfile

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      script:
        - cd ~/subsora
        - git pull origin master
        - echo $$DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $$DOCKER_USERNAME --password-stdin
        - docker-compose pull backend
        - docker-compose up -d --no-deps backend
    environment:
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }

