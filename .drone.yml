---
kind: pipeline
type: docker
name: full-redeploy-prod
platform:
  os: linux
  arch: amd64

steps:
  - name: check-changes
    image: alpine/git
    commands:
      - if ! git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -qE "(docker-compose.yml|.drone.yml)"; then exit 78; fi

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      script:
        - cd /root/subsora && git pull origin master
        - export $(cat .env | grep -v '^#' | xargs)
        - docker stack rm subsora || true
        - sleep 15
        - docker network inspect subsora_network >/dev/null 2>&1 || docker network create --driver overlay --attachable subsora_network
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth

trigger:
  branch: [main, master]
  event: [push]

