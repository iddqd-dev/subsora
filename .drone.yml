kind: pipeline
type: docker
name: subsora-backend

steps:
  - name: docker-build-push
    image: docker:dind
    privileged: true
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - dockerd --host=unix:///var/run/docker.sock --tls=false &
      - sleep 10
      - until docker info; do sleep 1; done
      - cd backend
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:latest .
      - docker push cicd.zerity.ru:55000/subsora/backend:latest

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "Creating subsora directory if not exists..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - echo "Updating repository..."
        - if [ -d ".git" ]; then git pull origin main || git pull origin master; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - echo "Deleting old stack..."
        - docker stack rm subsora
        - sleep 5
        - echo "Pulling new backend image..."
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest
        - echo "Exporting environment variables from .env file..."
        - export $(cat .env | grep -v '^#' | xargs)
        - echo "Deploying stack with exported variables..."
        - docker network create -d overlay --attachable subsora_network || true
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - echo "Waiting for services to update..."
        - sleep 20
        - echo "Checking stack services:"
        - docker stack services subsora
        - echo "Checking service tasks:"
        - docker service ps subsora_backend --no-trunc
        - echo "Waiting a bit more for backend to be ready..."
        - sleep 10
        - echo "Testing backend health (may take time for rolling update):"
        - timeout 60 bash -c 'until curl -f http://localhost:8000/docs > /dev/null 2>&1; do echo "Waiting for backend..."; sleep 3; done' || echo "Backend might still be updating, check service logs manually"
        - echo "Stack deployment completed!"
    depends_on:
      - docker-build-push

trigger:
  branch:
    - main
    - master
  event:
    - push

when:
  changeset:
    includes:
      - backend/**

