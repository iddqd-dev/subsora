# subsora-full-redeploy.yml
kind: pipeline
type: docker
name: subsora-full-redeploy

steps:
  - name: check-changes
    image: alpine/git
    commands:
      - echo "Checking for changes in 'docker-compose.yml' or '.drone.yml'..."
      - |
        if git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -qE "(docker-compose.yml|.drone.yml)"; then
          echo "Infrastructure changes detected. Continuing full redeploy."
        else
          echo "No infrastructure changes. Skipping pipeline."
          exit 78
        fi

  - name: full-redeploy
    # ... (остальные шаги без изменений)
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "🔄 Full redeployment triggered..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - if [ -d ".git" ]; then git pull origin master; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - export $(cat .env | grep -v '^#' | xargs)

        # Удаляем стек
        - docker stack rm subsora || echo "Stack not found, proceeding."
        - echo "Waiting for stack to be removed..."
        - sleep 15

        # ВАЖНО: Восстанавливаем сеть ПЕРЕД деплоем
        - echo "Ensuring network exists..."
        - docker network inspect subsora_network >/dev/null 2>&1 || docker network create --driver overlay --attachable subsora_network

        # Деплоим
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - echo "✅ Full stack redeployed!"
        - sleep 10
        - docker stack services subsora
    depends_on:
      - check-changes

trigger:
  branch:
    - main
    - master
  event:
    - push

