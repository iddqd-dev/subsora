# subsora-backend.yml
kind: pipeline
type: docker
name: subsora-backend

steps:
  # Этот шаг проверяет, были ли изменения в папке backend.
  # Если нет, выполнение конвейера прекращается с кодом 78 (пропустить).
  - name: check-changes
    image: alpine/git
    commands:
      - echo "Checking for changes in 'backend/' directory..."
      - git fetch origin main
      # Сравниваем текущий коммит с предыдущим в ветке
      - |
        if git diff --name-only origin/main HEAD | grep -q "backend/"; then
          echo "Changes detected in 'backend/'. Continuing pipeline."
        else
          echo "No changes in 'backend/'. Skipping pipeline."
          exit 78
        fi

  - name: docker-build-push
    image: docker:dind
    privileged: true
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - dockerd --host=unix:///var/run/docker.sock --tls=false &
      - sleep 10
      - until docker info; do sleep 1; done
      - cd backend
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:latest .
      - docker push cicd.zerity.ru:55000/subsora/backend:latest
    depends_on:
      - check-changes

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "Deploying backend..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - if [ -d ".git" ]; then git pull origin main; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest
        - docker service update --force --image cicd.zerity.ru:55000/subsora/backend:latest subsora_backend
        - echo "Backend deployed!"
    depends_on:
      - docker-build-push

trigger:
  branch:
    - main
    - master
  event:
    - push

