# subsora-full-redeploy.yml
kind: pipeline
type: docker
name: subsora-full-redeploy

steps:
  - name: check-changes
    image: alpine/git
    commands:
      - echo "Checking for changes in 'docker-compose.yml' or '.drone.yml'..."
      - git fetch origin main
      # Ищем изменения в любом из двух файлов
      - |
        if git diff --name-only origin/main HEAD | grep -qE "(docker-compose.yml|.drone.yml)"; then
          echo "Infrastructure changes detected. Continuing full redeploy."
        else
          echo "No infrastructure changes. Skipping pipeline."
          exit 78
        fi
        
  - name: full-redeploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "🔄 Full redeployment triggered..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - if [ -d ".git" ]; then git pull origin main; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - export $(cat .env | grep -v '^#' | xargs)
        # Удаляем и заново разворачиваем весь стек
        - docker stack rm subsora || echo "Stack not found, proceeding."
        - echo "Waiting for stack to be removed..."
        - sleep 15
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - echo "✅ Full stack redeployed!"
        - sleep 10
        - docker stack services subsora
    depends_on:
      - check-changes

trigger:
  branch:
    - main
    - master
  event:
    - push