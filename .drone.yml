# Вариант с ручными триггерами через commit message

kind: pipeline
type: docker
name: subsora-backend

steps:
  - name: docker-build-push
    image: docker:dind
    privileged: true
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - dockerd --host=unix:///var/run/docker.sock --tls=false &
      - sleep 10
      - until docker info; do sleep 1; done
      - cd backend
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:latest .
      - docker push cicd.zerity.ru:55000/subsora/backend:latest

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "Deploying backend..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - if [ -d ".git" ]; then git pull origin master || git pull origin main; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest
        - export $(cat .env | grep -v '^#' | xargs)
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - docker service update --force subsora_backend
        - echo "Backend deployed!"
    depends_on:
      - docker-build-push

trigger:
  branch:
    - main
    - master
  event:
    - push

# Запускается только если в commit message есть [backend] или [all]
when:
  message:
    includes:
      - "[backend]"
      - "[all]"

