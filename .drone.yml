kind: pipeline
type: docker
name: backend-prod
platform:
  os: linux
  arch: amd64
services:
  - name: docker
    image: docker:dind
    privileged: true
    ports:
      - 2375
steps:
  - name: check-changes
    image: alpine/git
    commands:
      - if ! git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -q "backend/"; then echo "No changes in backend/"; exit 78; fi
  
  - name: lint
    image: python:3.11-alpine
    working_dir: /workspace/backend
    commands:
      - pip install -q flake8 black isort
      - black --check .
      - isort --check-only .
      - flake8 . --max-line-length=120 --extend-ignore=E203,W503
    volumes:
      - name: workspace
        path: /workspace
  
  - name: unit-tests
    image: python:3.11-alpine
    working_dir: /workspace/backend
    commands:
      - pip install -q pytest pytest-cov
      - pip install -q -r requirements.txt
      - pytest tests/ -v --cov=app --cov-report=xml
    volumes:
      - name: workspace
        path: /workspace
  
  - name: build-push
    image: docker:latest
    environment:
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }
    commands:
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:${DRONE_COMMIT_SHA:0:8} -t cicd.zerity.ru:55000/subsora/backend:latest ./backend
      - docker push cicd.zerity.ru:55000/subsora/backend:${DRONE_COMMIT_SHA:0:8}
      - docker push cicd.zerity.ru:55000/subsora/backend:latest
    volumes:
      - name: docker_socket
        path: /var/run/docker.sock
  
  - name: scan-vulnerabilities
    image: aquasec/trivy:latest
    commands:
      - trivy image --severity HIGH,CRITICAL cicd.zerity.ru:55000/subsora/backend:${DRONE_COMMIT_SHA:0:8}
    volumes:
      - name: docker_socket
        path: /var/run/docker.sock
  
  - name: deploy-webhook
    image: curlimages/curl:latest
    environment:
      DEPLOY_WEBHOOK: { from_secret: deploy_webhook_backend_prod }
    commands:
      - curl -X POST $DEPLOY_WEBHOOK -H "Content-Type: application/json" -d "{\"image\":\"cicd.zerity.ru:55000/subsora/backend:${DRONE_COMMIT_SHA:0:8}\"}"
trigger:
  branch: [main, master]
  event: [push]

volumes:
  - name: workspace
    temp: {}
  - name: docker_socket
    host:
      path: /var/run/docker.sock
