# subsora-backend.yml
kind: pipeline
type: docker
name: subsora-backend

steps:
  # Этот шаг проверяет, были ли изменения в папке backend в рамках текущего push.
  - name: check-changes
    image: alpine/git
    commands:
      - echo "Checking for changes in 'backend/' directory..."
      # Сравниваем коммиты до и после push'а. Это работает для любой ветки.
      - |
        if git diff --name-only ${DRONE_COMMIT_BEFORE} ${DRONE_COMMIT_SHA} | grep -q "backend/"; then
          echo "Changes detected in 'backend/'. Continuing pipeline."
        else
          echo "No changes in 'backend/'. Skipping pipeline."
          exit 78
        fi

  - name: docker-build-push
    image: docker:dind
    privileged: true
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - dockerd --host=unix:///var/run/docker.sock --tls=false &
      - sleep 10
      - until docker info; do sleep 1; done
      - cd backend
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      - docker build -t cicd.zerity.ru:55000/subsora/backend:latest .
      - docker push cicd.zerity.ru:55000/subsora/backend:latest
    depends_on:
      - check-changes

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "Deploying backend..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - if [ -d ".git" ]; then git pull origin master; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi

        # 1. Создаем сеть (чтобы не упало, если это первый запуск)
        - docker network inspect subsora_network >/dev/null 2>&1 || docker network create --driver overlay --attachable subsora_network

        # 2. Накатываем стек (создаст сервис, если его нет)
        # ВАЖНО: Убедись, что файл называется docker-compose.yml или поправь название тут
        - docker stack deploy --with-registry-auth -c docker-compose.yml subsora

        # 3. Принудительно обновляем (чтобы подтянуть свежий latest)
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest
        - docker service update --force --image cicd.zerity.ru:55000/subsora/backend:latest subsora_backend

        - docker image prune -f
        - echo "Backend deployed!"
    depends_on:
      - docker-build-push

trigger:
  branch:
    - main
    - master
  event:
    - push

