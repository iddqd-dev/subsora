---

kind: pipeline
type: docker
name: subsora-full-redeploy

steps:
  - name: rebuild-all
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: ssh_host
      username:
        from_secret: ssh_user
      key:
        from_secret: ssh_key
      script:
        - echo "🔄 Full redeployment triggered..."
        - mkdir -p /root/subsora
        - cd /root/subsora
        - echo "Updating repository..."
        - if [ -d ".git" ]; then git pull origin master || git pull origin main; else git clone https://cicd.zerity.ru:55350/lokiboo_arud/subsora.git .; fi
        - echo "Pulling all images..."
        - docker pull cicd.zerity.ru:55000/subsora/backend:latest || echo "Backend image not found, skipping"
        - docker pull cicd.zerity.ru:55000/subsora/frontend:latest || echo "Frontend image not found, skipping"
        - docker pull cicd.zerity.ru:55000/subsora/bot:latest || echo "Bot image not found, skipping"
        - echo "Removing old stack completely..."
        - docker stack rm subsora || echo "Stack not found"
        - echo "Waiting for cleanup..."
        - sleep 15
        - echo "Cleaning up orphaned networks..."
        - docker network rm subsora_subsora_network 2>/dev/null || true
        - docker network prune -f
        - echo "Creating base network..."
        - docker network create -d overlay --attachable subsora_network 2>/dev/null || echo "Network already exists"
        - echo "Exporting variables from .env..."
        - export $(cat .env | grep -v '^#' | xargs)
        - echo "Deploying full stack..."
        - docker stack deploy -c docker-compose.yml subsora --with-registry-auth
        - echo "Waiting for services to start..."
        - sleep 20
        - echo "✅ Full stack redeployed!"
        - docker stack services subsora
        - echo ""
        - echo "Service status:"
        - docker service ls --filter "label=com.docker.stack.namespace=subsora"

trigger:
  branch:
    - main
    - master
  event:
    - push

when:
  changeset:
    includes:
      - docker-compose.yml
      - .drone.yml