kind: pipeline
type: docker
name: backend

volumes:
  - name: dockersock
    temp: {}

services:
  - name: docker
    image: docker:20.10.14-dind # Указал конкретную версию для стабильности
    privileged: true
    volumes:
      - name: dockersock
        path: /var/run

trigger:
  branch: [master]
  event: [push]
  path: [backend/**]

steps:
  - name: build and push backend
    image: docker:20.10.14 # Та же версия, что и у dind
    volumes:
      - name: dockersock
        path: /var/run
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      # Ждем, пока Docker-демон в сервисе dind станет доступен
      - |
        timeout=20
        while ! docker ps > /dev/null 2>&1; do
          sleep 1
          timeout=$(expr $timeout - 1)
          if [ $timeout -eq 0 ]; then
            echo "Docker daemon in dind failed to start."
            exit 1
          fi
        done
      # 1. Логинимся в registry
      - echo $DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $DOCKER_USERNAME --password-stdin
      # 2. Собираем образ
      - docker build -t subsora-backend -f backend/Dockerfile ./backend
      # 3. Тегируем его для пуша
      - docker tag subsora-backend cicd.zerity.ru:55000/subsora/backend:latest
      # 4. Пушим образ
      - docker push cicd.zerity.ru:55000/subsora/backend:latest

  - name: deploy backend
    image: appleboy/drone-ssh
    settings:
      host: { from_secret: ssh_host }
      username: { from_secret: ssh_user }
      key: { from_secret: ssh_key }
      script:
        - cd ~/subsora
        - git pull origin master
        - echo $$DOCKER_PASSWORD | docker login cicd.zerity.ru:55000 -u $$DOCKER_USERNAME --password-stdin
        - docker-compose pull backend
        - docker-compose up -d --no-deps backend
    environment:
      DOCKER_USERNAME: { from_secret: docker_username }
      DOCKER_PASSWORD: { from_secret: docker_password }

---

