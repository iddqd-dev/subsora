version: '3.8'

services:
  db:
    image: postgres:14.8-alpine3.18
    hostname: db
    environment:
      POSTGRES_DB: "subsora"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - subsora_network
    ports:
      - target: 5432
        published: 45432
        protocol: tcp
        mode: host
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d subsora" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  

  backend:
    image: cicd.zerity.ru:55000/subsora/backend:latest
    ports:
      - target: 8000
        published: 48000
        protocol: tcp
        mode: host
    configs:
      - source: backend_env_config
        target: /app/.env
        mode: 0444
    deploy:
      endpoint_mode: dnsrr
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: stop-first
    depends_on:
      - db
    command: ["sh", "-c", "echo 'Waiting for database...' && until nc -z db 5432; do echo 'Database not ready, waiting...'; sleep 2; done && echo 'Database is ready!' && alembic -c /app/backend/alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"]
    networks:
      - subsora_network

  bot:
    image: cicd.zerity.ru:55000/subsora/bot:latest
    configs:
      - source: bot_env_config
        target: /app/.env
        mode: 0444
    deploy:
      restart_policy:
        condition: any
    depends_on:
      - backend
    networks:
      - subsora_network

  frontend:
    image: cicd.zerity.ru:55000/subsora/frontend:latest
    ports:
      - target: 80
        published: 48080
        protocol: tcp
        mode: host
      - target: 443
        published: 48443
        protocol: tcp
        mode: host
    deploy:
      restart_policy:
        condition: any
    networks:
      - subsora_network

  nginx-proxy:
    image: nginx:1.25-alpine
    ports:
      - target: 80
        published: 48081
        protocol: tcp
        mode: host
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      restart_policy:
        condition: any
    depends_on:
      - frontend
      - backend
    networks:
      - subsora_network

volumes:
  postgres_data:
    external: true

configs:
  bot_env_config:
    file: /root/subsora/bot/.env
  backend_env_config:
    file: /root/subsora/.env

networks:
  subsora_network:
    driver: overlay
    attachable: true