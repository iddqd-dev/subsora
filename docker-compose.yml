version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: subsora-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subsora
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subsora"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: cicd.zerity.ru:55000/subsora/backend:latest
    container_name: subsora-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    secrets:
      - source: subsora_backend_env
        target: /app/backend/.env
        mode: 0400
    depends_on:
      - db
    networks:
      - default

  bot:
    image: cicd.zerity.ru:55000/subsora/bot:latest
    container_name: subsora-bot
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - default

  frontend:
    image: cicd.zerity.ru:55000/subsora/frontend:latest
    container_name: subsora-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - default

  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: subsora-nginx-proxy
    restart: always
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - default

volumes:
  postgres_data:
    name: subsora_postgres_data

networks:
  default:
    name: subsora_network

secrets:
  subsora_backend_env:
    external: true