version: '3.8'

services:
  db:
    image: postgres:14.8-alpine3.18
    hostname: db
    environment:
      POSTGRES_DB: "subsora"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - subsora_network
    ports:
      - target: 5432
        published: 5433
        protocol: tcp
        mode: host  # Ключевое отличие!
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      replicas: 1
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d subsora" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  

  backend:
    image: cicd.zerity.ru:55000/subsora/backend:latest
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: host
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/subsora
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-dummy_token}
      - TELEGRAM_BOT_SECRET=${TELEGRAM_BOT_SECRET:-dummy_secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecret}
      - PROJECT_NAME=Subsora
      - VERSION=0.1.0
      - API_V1_STR=/api/v1
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      - ENVIRONMENT=production
      - DEBUG=false
      - VPN_PANEL_URL=${VPN_PANEL_URL:-https://domain.com}
      - VPN_PANEL_PORT=${VPN_PANEL_PORT:-8002}
      - VPN_PANEL_USER=${VPN_PANEL_USER:-admin}
      - VPN_PANEL_PASSWORD=${VPN_PANEL_PASSWORD:-password}
      - VPN_PANEL_SSL=${VPN_PANEL_SSL:-true}
      - SMTP_TLS=${SMTP_TLS:-true}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - REDIS_URL=${REDIS_URL:-}
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    depends_on:
      - db
    command: ["sh", "-c", "echo 'Waiting for database...' && until nc -z db 5432; do echo 'Database not ready, waiting...'; sleep 2; done && echo 'Database is ready!' && alembic -c /app/backend/alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"]
    networks:
      - subsora_network

#  bot:
#    image: cicd.zerity.ru:55000/subsora/bot:latest
#    deploy:
#      restart_policy:
#        condition: any
#    depends_on:
#      - backend
#    networks:
#      - subsora_network
#
  frontend:
    image: cicd.zerity.ru:55000/subsora/frontend:latest
    ports:
      - "8880:80"
      - "8443:443"
    deploy:
      restart_policy:
        condition: any
    networks:
      - subsora_network

  nginx-proxy:
    image: nginx:1.25-alpine
    ports:
      - "8081:80"  # Изменил на 8080, чтобы избежать конфликта с основным nginx
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      restart_policy:
        condition: any
    depends_on:
      - frontend
      - backend
    networks:
      - subsora_network

volumes:
  postgres_data:

networks:
  subsora_network:
    driver: overlay
    attachable: true