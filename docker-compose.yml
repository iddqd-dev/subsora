version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5433:5432"  # Изменил на 5433, чтобы избежать конфликта
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subsora
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == manager  # Или убери если у тебя один нод
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subsora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subsora_network

  backend:
    image: cicd.zerity.ru:55000/subsora/backend:latest
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432  # Внутри контейнера остается 5432
      # Добавь остальные переменные из .env
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/subsora
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    depends_on:
      - db
    networks:
      - subsora_network

